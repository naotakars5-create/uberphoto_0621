<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff8f3">
  <link rel="manifest" href="/static/manifest.json">
  <title>UberPHOTO — オペレーター</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <div class="app wide">
    <div class="topbar">
      <a class="navback" href="/" aria-label="ホームに戻る"><i data-icon="back" data-size="18"></i></a>
      <a class="logo" href="/"><span class="u">Uber</span>PHOTO</a>
      <div class="badge">Operator</div>
    </div>

    <p class="eyebrow">Live · 浅草エリア</p>
    <h1>需給モニタリング</h1>
    <p class="sub">リアルタイム更新</p>

    <div class="stat-grid">
      <div class="stat"><i data-icon="user" data-size="20"></i><div class="n" id="s-online">0</div><div class="l">待機中カメラマン</div></div>
      <div class="stat"><i data-icon="camera" data-size="20"></i><div class="n" id="s-busy">0</div><div class="l">撮影中</div></div>
      <div class="stat"><i data-icon="clock" data-size="20"></i><div class="n" id="s-waiting">0</div><div class="l">マッチ待ち</div></div>
      <div class="stat"><i data-icon="zap" data-size="20"></i><div class="n" id="s-rate">0%</div><div class="l">マッチ成立率</div></div>
    </div>

    <h2 style="margin-top:34px">最近のリクエスト</h2>
    <table>
      <thead><tr><th>#</th><th>お客様</th><th>プラン</th><th>カメラマン</th><th>状態</th></tr></thead>
      <tbody id="recent"></tbody>
    </table>
  </div>

  <script src="/static/js/icons.js"></script>
  <script src="/static/js/common.js"></script>
  <script src="/static/js/operator.js"></script>
</body>
</html>
